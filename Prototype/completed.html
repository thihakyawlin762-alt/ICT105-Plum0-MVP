<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Completed Assignments | Smart Assignment Tracker</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="dashboard-container">

    <aside class="sidebar">

        <div class="sidebar-logo">

            <img src="assets/logo/logo.png" alt="Logo">

            <h2>
                Smart<br>
                Assignment<br>
                Tracker
            </h2>

        </div>

        <ul>

            <li><a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a></li>

            <li><a href="add-assignment.html"><i class="fa-solid fa-plus"></i> Add Assignment</a></li>

            <li><a href="search.html"><i class="fa-solid fa-magnifying-glass"></i> Search</a></li>

            <li class="active">
                <a href="completed.html">
                    <i class="fa-solid fa-circle-check"></i> Completed
                </a>
            </li>

            <li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>

        </ul>

    </aside>

    <main class="dashboard-content">

        <h1>Completed Assignments</h1>

        <table class="assignment-table">

            <thead>

                <tr>

                    <th>Course</th>
                    <th>Assignment</th>
                    <th>Due Date</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </main>

</div>

<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/completed.js"></script>

</body>

</html>

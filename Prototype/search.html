<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Search Assignments | Smart Assignment Tracker</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="dashboard-container">

    <aside class="sidebar">

        <div class="sidebar-logo">

            <img src="assets/logo/logo.png" alt="Logo">

            <h2>Smart Assignment Tracker</h2>

        </div>

        <ul>

            <li><a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a></li>

            <li><a href="add-assignment.html"><i class="fa-solid fa-plus"></i> Add Assignment</a></li>

            <li><a href="search.html" class="active"><i class="fa-solid fa-magnifying-glass"></i> Search</a></li>

            <li><a href="completed.html"><i class="fa-solid fa-circle-check"></i> Completed</a></li>

            <li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>

        </ul>

    </aside>

    <main class="dashboard-content">

        <h1>Search Assignments</h1>

        <div class="search-bar">

    <input
        type="text"
        id="searchInput"
        placeholder="Search by course or assignment title...">

    <select id="priorityFilter">

        <option value="">All Priorities</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>

    </select>

    <select id="statusFilter">

        <option value="">All Status</option>
        <option value="Pending">Pending</option>
        <option value="Completed">Completed</option>

    </select>

</div>

        <table class="assignment-table">

            <thead>

                <tr>

                    <th>Course</th>

                    <th>Assignment</th>

                    <th>Due Date</th>

                    <th>Priority</th>

                    <th>Status</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </main>

</div>

<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/search.js"></script>

</body>

</html>
